name: Build ChatGPT Projects and Sync to Google Drive

on:
  push:
    branches:
      - main

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate ChatGPT Project build files
        run: python3 scripts/build_chatgpt_projects.py --config config/chatgpt-project-builds.json

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo '${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}' > sa.json

          cat > ~/.config/rclone/rclone.conf <<EOF
          [gdrive]
          type = drive
          scope = drive
          service_account_file = sa.json
          impersonate = ${{ vars.WORKSPACE_USER }}
          EOF

      - name: Build ChatGPT Projects and Sync to Google Drive
        run: |
          rclone sync . gdrive: \
            --drive-root-folder-id "${{ vars.FOLDER_ID }}" \
            --exclude ".git/**" \
            --exclude ".github/**" \
            --exclude ".gitignore" \
            --exclude "sa.json" \
            -v